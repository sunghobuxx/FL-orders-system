name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js)
        working-directory: apps/web
        env:
          VERCEL: ''
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: Build (next-on-pages)
        working-directory: apps/web
        env:
          VERCEL: ''
        run: pnpm dlx @cloudflare/next-on-pages@1.13.16

      - name: Remove _routes.json (worker handles all routes by default)
        working-directory: apps/web
        run: rm -f .vercel/output/static/_routes.json

      - name: Fix worker index.js (next-on-pages bug - root / mapped to favicon)
        working-directory: apps/web
        run: |
          python3 << 'PYEOF'
          import re
          path = '.vercel/output/static/_worker.js/index.js'
          content = open(path).read()
          WRONG = '"/":{type:"override",path:"/favicon.ico",headers:{"content-type":"image/x-icon"}}'
          RIGHT = '"/":{type:"function",entrypoint:"__next-on-pages-dist__/functions/index.func.js"}'
          if WRONG in content:
              open(path, 'w').write(content.replace(WRONG, RIGHT))
              print('SUCCESS: patched / route to index.func.js')
          else:
              print('WARNING: pattern not found - checking worker content...')
              import re
              m = re.search(r'"/":\{[^}]+\}', content)
              if m: print('Current / mapping:', m.group())
          PYEOF

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler pages deploy .vercel/output/static --project-name fruitlife --branch main
