name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js)
        working-directory: apps/web
        env:
          VERCEL: ''
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: Build (next-on-pages)
        working-directory: apps/web
        env:
          VERCEL: ''
        run: pnpm dlx @cloudflare/next-on-pages@1.13.16

      - name: Fix _routes.json (add explicit root path)
        working-directory: apps/web
        run: |
          python3 -c "
          import json
          path = '.vercel/output/static/_routes.json'
          r = json.load(open(path))
          if '/' not in r['include']:
              r['include'] = ['/'] + r['include']
          json.dump(r, open(path, 'w'), separators=(',',':'))
          print('_routes.json:', json.dumps(r))
          "

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler pages deploy .vercel/output/static --project-name fruitlife --branch main
