name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js)
        working-directory: apps/web
        env:
          VERCEL: ''
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: Build (next-on-pages)
        working-directory: apps/web
        env:
          VERCEL: ''
        run: pnpm dlx @cloudflare/next-on-pages@1.13.16

      - name: Fix bracket-path static chunks (CF Pages cannot serve [bracket] directories)
        working-directory: apps/web
        run: |
          python3 << 'PYEOF'
          import os, shutil

          next_static = '.vercel/output/static/_next/static'

          # Find all files in [bracket] directories
          bracket_chunks = []
          for root, dirs, files in os.walk(next_static):
              for f in files:
                  full = os.path.join(root, f)
                  rel = os.path.relpath(full, next_static).replace(os.sep, '/')
                  if '[' in rel or ']' in rel:
                      bracket_chunks.append((full, rel))

          if not bracket_chunks:
              print('No bracket-path files found - skipping')
          else:
              print(f'Found {len(bracket_chunks)} bracket-path files:')
              for _, rel in bracket_chunks:
                  print(f'  {rel}')

              # Step 1: Copy to debracketized paths
              for src, rel in bracket_chunks:
                  new_rel = rel.replace('[', '').replace(']', '')
                  dst = os.path.join(next_static, new_rel)
                  os.makedirs(os.path.dirname(dst), exist_ok=True)
                  shutil.copy2(src, dst)
                  print(f'Copied: {rel} -> {new_rel}')

              # Step 2: Patch manifest JS/JSON files to reference debracketized paths
              patched_files = 0
              for root, dirs, files in os.walk(next_static):
                  for f in files:
                      if not (f.endswith('.js') or f.endswith('.json')):
                          continue
                      full = os.path.join(root, f)
                      rel_full = os.path.relpath(full, next_static).replace(os.sep, '/')
                      if '[' in rel_full:
                          continue  # skip bracket files themselves
                      try:
                          content = open(full, encoding='utf-8').read()
                      except Exception:
                          continue
                      new_content = content
                      for _, chunk_rel in bracket_chunks:
                          debracketed = chunk_rel.replace('[', '').replace(']', '')
                          if chunk_rel in new_content:
                              new_content = new_content.replace(chunk_rel, debracketed)
                      if new_content != content:
                          open(full, 'w', encoding='utf-8').write(new_content)
                          patched_files += 1
                          print(f'Patched manifest: {rel_full}')

              print(f'Done: copied {len(bracket_chunks)} bracket files, patched {patched_files} manifests')
          PYEOF

      - name: Fix worker index.js (next-on-pages bug - root / mapped to favicon)
        working-directory: apps/web
        run: |
          python3 << 'PYEOF'
          import re
          path = '.vercel/output/static/_worker.js/index.js'
          content = open(path).read()
          WRONG = '"/":{type:"override",path:"/favicon.ico",headers:{"content-type":"image/x-icon"}}'
          RIGHT = '"/":{type:"function",entrypoint:"__next-on-pages-dist__/functions/index.func.js"}'
          if WRONG in content:
              open(path, 'w').write(content.replace(WRONG, RIGHT))
              print('SUCCESS: patched / route to index.func.js')
          else:
              print('WARNING: pattern not found - checking worker content...')
              import re
              m = re.search(r'"/":\{[^}]+\}', content)
              if m: print('Current / mapping:', m.group())
          PYEOF

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler pages deploy .vercel/output/static --project-name fruitlife --branch main
