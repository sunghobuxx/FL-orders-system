name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build (Next.js)
        working-directory: apps/web
        env:
          VERCEL: ''
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: Build (next-on-pages)
        working-directory: apps/web
        env:
          VERCEL: ''
        run: pnpm dlx @cloudflare/next-on-pages@1.13.16

      - name: Fix bracket-path static chunks (CF Pages cannot serve [bracket] directories)
        working-directory: apps/web
        run: |
          python3 << 'PYEOF'
          import os, shutil

          next_static = '.vercel/output/static/_next/static'
          worker_dir = '.vercel/output/static/_worker.js'

          # Find all files in [bracket] directories under _next/static
          bracket_chunks = []
          for root, dirs, files in os.walk(next_static):
              for f in files:
                  full = os.path.join(root, f)
                  rel = os.path.relpath(full, next_static).replace(os.sep, '/')
                  if '[' in rel or ']' in rel:
                      bracket_chunks.append((full, rel))

          if not bracket_chunks:
              print('No bracket-path files found - skipping')
          else:
              print(f'Found {len(bracket_chunks)} bracket-path files')

              # Step 1: Copy to debracketized paths
              for src, rel in bracket_chunks:
                  new_rel = rel.replace('[', '').replace(']', '')
                  dst = os.path.join(next_static, new_rel)
                  os.makedirs(os.path.dirname(dst), exist_ok=True)
                  shutil.copy2(src, dst)
                  print(f'Copied: {rel} -> {new_rel}')

              # Step 2: Patch JS/JSON files in BOTH _next/static AND _worker.js
              # _worker.js contains RSC chunk registrations that reference [bracket] paths
              # Browser uses these URLs; CDN has poisoned text/plain for old bracket hashes
              # Replacing [bracket] with bracket-less path means browser requests unpoisoned URL
              patched_files = 0
              search_dirs = [next_static, worker_dir]
              for search_dir in search_dirs:
                  if not os.path.isdir(search_dir):
                      continue
                  for root, dirs, files in os.walk(search_dir):
                      for f in files:
                          if not (f.endswith('.js') or f.endswith('.json')):
                              continue
                          full = os.path.join(root, f)
                          rel_full = os.path.relpath(full, search_dir).replace(os.sep, '/')
                          # In _next/static, skip the bracket-path source chunks themselves
                          # In _worker.js, do NOT skip .func.js files even if their path has brackets
                          # (e.g. admin/orders/[batchId].func.js contains the RSC manifest)
                          if '[' in rel_full and search_dir == next_static:
                              continue
                          try:
                              content = open(full, encoding='utf-8').read()
                          except Exception:
                              continue
                          new_content = content
                          for _, chunk_rel in bracket_chunks:
                              # chunk_rel = "chunks/app/.../[x]/page-hash.js"
                              debracketed = chunk_rel.replace('[', '').replace(']', '')
                              # URL-encoded versions: webpack runtime stores bracket paths as %5B/%5D
                              chunk_enc = chunk_rel.replace('[', '%5B').replace(']', '%5D')
                              chunk_enc_lc = chunk_rel.replace('[', '%5b').replace(']', '%5d')

                              # Build all pattern variants to search (literal + URL-encoded)
                              variants = [
                                  (chunk_rel, debracketed),
                                  (chunk_enc, debracketed),
                                  (chunk_enc_lc, debracketed),
                                  ('static/' + chunk_rel, 'static/' + debracketed),
                                  ('static/' + chunk_enc, 'static/' + debracketed),
                              ]
                              if chunk_rel.startswith('chunks/'):
                                  after = chunk_rel[len('chunks/'):]
                                  after_d = debracketed[len('chunks/'):]
                                  after_enc = chunk_enc[len('chunks/'):]
                                  after_enc_lc = chunk_enc_lc[len('chunks/'):]
                                  variants += [
                                      (after, after_d),
                                      (after_enc, after_d),
                                      (after_enc_lc, after_d),
                                  ]
                                  if after.endswith('.js'):
                                      no_ext = after[:-3]
                                      no_ext_d = after_d[:-3]
                                      variants += [
                                          (no_ext, no_ext_d),
                                          (after_enc[:-3], no_ext_d),
                                          (after_enc_lc[:-3], no_ext_d),
                                      ]

                              for pattern, replacement in variants:
                                  if pattern in new_content:
                                      new_content = new_content.replace(pattern, replacement)
                                      print(f'  replaced: {pattern[:60]} -> {replacement[:60]}')
                          if new_content != content:
                              open(full, 'w', encoding='utf-8').write(new_content)
                              patched_files += 1
                              print(f'Patched: {os.path.basename(search_dir)}/{rel_full}')

              print(f'Done: copied {len(bracket_chunks)} bracket files, patched {patched_files} files')
          PYEOF

      - name: Fix worker index.js (next-on-pages bug - root / mapped to favicon)
        working-directory: apps/web
        run: |
          python3 << 'PYEOF'
          import re
          path = '.vercel/output/static/_worker.js/index.js'
          content = open(path).read()
          WRONG = '"/":{type:"override",path:"/favicon.ico",headers:{"content-type":"image/x-icon"}}'
          RIGHT = '"/":{type:"function",entrypoint:"__next-on-pages-dist__/functions/index.func.js"}'
          if WRONG in content:
              open(path, 'w').write(content.replace(WRONG, RIGHT))
              print('SUCCESS: patched / route to index.func.js')
          else:
              print('WARNING: pattern not found - checking worker content...')
              import re
              m = re.search(r'"/":\{[^}]+\}', content)
              if m: print('Current / mapping:', m.group())
          PYEOF

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler pages deploy .vercel/output/static --project-name fruitlife --branch main

      - name: Purge Cloudflare CDN cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ZONE=$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=fruitlife.shop" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])")
          echo "Zone: $ZONE"
          RES=$(curl -sf -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE/purge_cache" \
            -d '{"purge_everything":true}')
          echo "Purge result: $RES"
